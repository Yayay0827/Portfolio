<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="motionStyle.css">
</head>
<body>
    
<header>
  <div class="logo">
    <h1>
    <img src="imgHeader/SerinSun.PNG" alt="" class="serinSun">
    </h1>
  </div>

  <nav>
    <a href="index.html">
      <img 
       src="imgHeader/aboutIdle.PNG" 
       class="aboutMeIcon"
       onmouseover="this.src='imgHeader/aboutHover.PNG'"
       onmouseout="this.src='imgHeader/aboutIdle.PNG'"
       >
    </a>

    <a href="design.html">
      <img 
       src="imgHeader/designIdle.PNG" alt="" 
       class="designIcon"
       onmouseover="this.src='imgHeader/designHover.PNG'"
       onmouseout="this.src='imgHeader/designIdle.PNG'"
      >
    </a>

    <a href="illustration.html">
      <img src="imgHeader/illustrationIdle.PNG" class="illustrationIcon"
       onmouseover="this.src='imgHeader/illustrationHover.PNG'"
       onmouseout="this.src='imgHeader/illustrationIdle.PNG'">
    </a>

    <a href="motion.html">
      <img src="imgHeader/motionIdle.PNG" class="motionIcon"
       onmouseover="this.src='imgHeader/motionHover.PNG'"
       onmouseout="this.src='imgHeader/motionIdle.PNG'">
    </a>

  </nav>
</header>

<div class="videoWrapper">

    <video autoplay muted loop playsinline class="hero-video">
      <source src="imgMotion/LightLibrary.mp4" type="video/mp4">
    </video>
</div>

<section class="video-grid">

  <div class="video-item left">
  <iframe width="560" height="315" src="https://www.youtube.com/embed/z4V-UrHtzVM?si=QWVS2joyZ8g1_GW1" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
  </div>

  <div class="video-item right">
    <iframe src="https://youtu.be/embed/LuUYJy0GwRY?si=het_rUr5hS2IseAx"
      frameborder="0" allowfullscreen></iframe>
  </div>

  <div class="video-item left">
    <iframe src="https://youtu.be/embed/KeAyAQ8ULhY?si=e8s9X8dXTp7XWPeR"
      frameborder="0" allowfullscreen></iframe>
  </div>

  <div class="video-item right">
    <iframe src="https://youtu.be/embed/klKvQI9OOzc?si=gVxS9iF9ZERQdnZQ"
      frameborder="0" allowfullscreen></iframe>
  </div>

</section>

</body>
</html>
